name: Contract Gate Check

on:
  pull_request:
  push:
    branches:
      - main
      - ap2v0.2

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust contract toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt --target wasm32v1-none
      - name: Gate check all contracts
        run: ./scripts/gatecheck-contracts.sh
