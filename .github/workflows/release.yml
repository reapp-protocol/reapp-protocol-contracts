name: Build and Release
on:
  push:
    tags:
      - 'v*'
      - 'simple-v*'
      - 'composites-v*'
permissions:
  id-token: write
  contents: write
  attestations: write
jobs:
  gatecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust contract toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt --target wasm32v1-none
      - name: Gatecheck both contracts
        run: ./scripts/gatecheck-contracts.sh

  release-composites-mandate-registry:
    needs: gatecheck
    if: startsWith(github.ref_name, 'composites-v') || (startsWith(github.ref_name, 'v') && !startsWith(github.ref_name, 'v0.1.'))
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@v25.1.0
    with:
      release_name: ${{ github.ref_name }}
      release_description: 'Composite MandateRegistry contract release'
      relative_path: 'contracts/composites/mandate-registry'
      package: 'mandate-registry'
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  release-simple-mandate-registry:
    needs: gatecheck
    if: startsWith(github.ref_name, 'simple-v') || startsWith(github.ref_name, 'v0.1.')
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@v25.1.0
    with:
      release_name: ${{ github.ref_name }}
      release_description: 'Simple MandateRegistry contract release'
      relative_path: 'contracts/simple/mandate-registry'
      package: 'mandate-registry'
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}
